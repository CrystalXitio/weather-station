<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="branding">
                <div class="pulse"></div>
                <span class="branding-text">SYSTEM ONLINE</span>
            </div>
            <h1>Weather <span>Station</span></h1>
        </header>
        
        <div class="chart-grid">
            <div class="sensor-card">
                <div class="card-header">
                    <div class="label-group"><h3>Temperature</h3></div>
                    <select class="time-select" id="range-temp" onchange="renderSpecificChart('temp')">
                        <option value="1">1 HR</option>
                        <option value="6">6 HR</option>
                        <option value="12">12 HR</option>
                        <option value="24">1 DAY</option>
                        <option value="168">1 WEEK</option>
                        <option value="max">MAX</option>
                    </select>
                </div>
                <div class="value-container">
                    <span class="sensor-value" id="val-temp">--</span>
                    <span class="sensor-unit" id="unit-temp">°C</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart-temp"></canvas>
                </div>
            </div>

            <div class="sensor-card">
                <div class="card-header">
                    <div class="label-group"><h3>Humidity</h3></div>
                    <select class="time-select" id="range-hum" onchange="renderSpecificChart('hum')">
                        <option value="1">1 HR</option>
                        <option value="6">6 HR</option>
                        <option value="12">12 HR</option>
                        <option value="24">1 DAY</option>
                        <option value="168">1 WEEK</option>
                        <option value="max">MAX</option>
                    </select>
                </div>
                <div class="value-container">
                    <span class="sensor-value" id="val-hum">--</span>
                    <span class="sensor-unit" id="unit-hum">%</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart-hum"></canvas>
                </div>
            </div>

            <div class="sensor-card">
                <div class="card-header">
                    <div class="label-group"><h3>CO2 Level</h3></div>
                    <select class="time-select" id="range-co2" onchange="renderSpecificChart('co2')">
                        <option value="1">1 HR</option>
                        <option value="6">6 HR</option>
                        <option value="12">12 HR</option>
                        <option value="24">1 DAY</option>
                        <option value="168">1 WEEK</option>
                        <option value="max">MAX</option>
                    </select>
                </div>
                <div class="value-container">
                    <span class="sensor-value" id="val-co2">--</span>
                    <span class="sensor-unit" id="unit-co2">PPM</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart-co2"></canvas>
                </div>
            </div>

            <div class="sensor-card">
                <div class="card-header">
                    <div class="label-group"><h3>Light</h3></div>
                    <select class="time-select" id="range-lux" onchange="renderSpecificChart('lux')">
                        <option value="1">1 HR</option>
                        <option value="6">6 HR</option>
                        <option value="12">12 HR</option>
                        <option value="24">1 DAY</option>
                        <option value="168">1 WEEK</option>
                        <option value="max">MAX</option>
                    </select>
                </div>
                <div class="value-container">
                    <span class="sensor-value" id="val-lux">--</span>
                    <span class="sensor-unit" id="unit-lux">LUX</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart-lux"></canvas>
                </div>
            </div>

            <div class="sensor-card">
                <div class="card-header">
                    <div class="label-group"><h3>Pressure</h3></div>
                    <select class="time-select" id="range-press" onchange="renderSpecificChart('press')">
                        <option value="1">1 HR</option>
                        <option value="6">6 HR</option>
                        <option value="12">12 HR</option>
                        <option value="24">1 DAY</option>
                        <option value="168">1 WEEK</option>
                        <option value="max">MAX</option>
                    </select>
                </div>
                <div class="value-container">
                    <span class="sensor-value" id="val-press">--</span>
                    <span class="sensor-unit" id="unit-press">hPa</span>
                </div>
                <div class="chart-container">
                    <canvas id="chart-press"></canvas>
                </div>
            </div>
        </div>
        
        <footer>
            <p>ESP32 Cloud Environmental Monitor &copy; 2026. Live Data from Google Sheets.</p>
        </footer>
    </div>

    <script src="./script.js"></script>
</body>
</html>
