<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere Titanium OS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0f1a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #00d2ff;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.07) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(147, 51, 234, 0.07) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: auto; }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .branding {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .pulse {
            width: 10px; height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }

        h1 { 
            font-size: 2.8rem; 
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 30%, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Centered Flex Grid: This keeps things centralized regardless of sensor count */
        .chart-grid { 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .sensor-card { 
            flex: 1 1 400px;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .sensor-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .label-group h3 {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .sensor-value { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.8rem; 
            font-weight: 500; 
            color: #fff;
        }

        .sensor-unit { 
            font-size: 1rem; 
            color: var(--accent); 
            margin-left: 8px;
        }

        canvas { 
            width: 100% !important; 
            height: 180px !important; 
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="branding">
                <div class="pulse"></div>
                <span style="font-size: 0.7rem; letter-spacing: 3px; font-weight: 700; color: #00ff88;">SYSTEM ONLINE</span>
            </div>
            <h1>Weather <span style="font-weight: 200;">Station</span></h1>
        </header>
        
        <div class="chart-grid">
            <div class="sensor-card">
                <div class="label-group"><h3>Temperature</h3><span class="sensor-value" id="val-temp">--</span><span class="sensor-unit">°C</span></div>
                <canvas id="chart-temp"></canvas>
            </div>
            <div class="sensor-card">
                <div class="label-group"><h3>Humidity</h3><span class="sensor-value" id="val-hum">--</span><span class="sensor-unit">%</span></div>
                <canvas id="chart-hum"></canvas>
            </div>
            <div class="sensor-card">
                <div class="label-group"><h3>CO2 Level</h3><span class="sensor-value" id="val-co2">--</span><span class="sensor-unit">PPM</span></div>
                <canvas id="chart-co2"></canvas>
            </div>
            <div class="sensor-card">
                <div class="label-group"><h3>Light</h3><span class="sensor-value" id="val-lux">--</span><span class="sensor-unit">LUX</span></div>
                <canvas id="chart-lux"></canvas>
            </div>
            <div class="sensor-card">
                <div class="label-group"><h3>Pressure</h3><span class="sensor-value" id="val-press">--</span><span class="sensor-unit">hPa</span></div>
                <canvas id="chart-press"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPXP92EqtheXrh3Z20EyP8SicTPMdIuM1Lcn12xnfhTKZhzXnv8Mrp4AXB5D8zp0VUPVcZPmaeSnzK/pub?output=csv";
        
        const chartInstances = {};
        const sensorConfig = {
            temp: { color: '#ff3e3e' },
            hum: { color: '#00d2ff' },
            co2: { color: '#32d74b' },
            lux: { color: '#ffd60a' },
            press: { color: '#94a3b8' }
        };

        function fetchData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    const data = results.data;
                    if(data.length < 2) return; 

                    // Filter out any empty rows at the bottom of the sheet
                    const validData = data.filter(row => row.length >= 8 && row[0] !== "");
                    
                    // 1. UPDATE THE CARDS (Grab the very last row of the sheet)
                    const latest = validData[validData.length - 1];
                    document.getElementById('val-temp').innerText = latest[2] || '--';
                    document.getElementById('val-hum').innerText = latest[3] || '--';
                    document.getElementById('val-lux').innerText = latest[4] || '--';
                    document.getElementById('val-co2').innerText = latest[5] || '--';
                    document.getElementById('val-press').innerText = latest[7] || '--';

                    // 2. PREPARE DATA FOR CHARTS (Grab the last 20 rows)
                    const chartData = validData.slice(-20);
                    const labels = chartData.map(row => {
                        let d = new Date(row[0]);
                        return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
                    });

                    // 3. UPDATE INDIVIDUAL CHARTS
                    updateChart('temp', labels, chartData.map(row => parseFloat(row[2])));
                    updateChart('hum', labels, chartData.map(row => parseFloat(row[3])));
                    updateChart('lux', labels, chartData.map(row => parseFloat(row[4])));
                    updateChart('co2', labels, chartData.map(row => parseFloat(row[5])));
                    updateChart('press', labels, chartData.map(row => parseFloat(row[7])));
                }
            });
        }

        function updateChart(id, labels, data) {
            const ctx = document.getElementById('chart-' + id).getContext('2d');
            
            // Destroy old charts to prevent overlapping glitches on refresh
            if (chartInstances[id]) chartInstances[id].destroy();

            chartInstances[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: sensorConfig[id].color,
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: sensorConfig[id].color + '15',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        // Fetch immediately, then every 10 seconds
        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
